# Glossary Contract — consumer-side configuration for aster-lang-dev.
# Plan: aster-cloud/.claude/plan/glossary-contract.md (v7) §1.4 + §5.
#
# Stage 1: tier=community, report-only.
# Stage 4 (post-strict-flip): tier=official.

version: 1
tier: community
localesVersion: 1

# Explicit allowlist of locale subdirectories under docs/. When
# @aster-cloud/glossary is available, this is cross-checked against
# glossary.locales (any entry not registered there is a hard error).
# When the glossary package isn't available (e.g. CI without sibling
# checkout), this list IS the locale set — the alternative is a
# filesystem heuristic that misclassifies dirs like "api" as locales.
locale-dirs:
  - de
  - zh

glossary-pin:
  version: 0.1.0
  npm-integrity: pending-g8a-publish
  maven-sha256: pending-g8a-publish

surfaces:
  docs:
    type: markdown
    paths: docs/**/*.md
    locale-from-frontmatter: true
    fallback-locale: en-US
    alignment: block-id
    block-map: docs/.glossary/block-map.json

# 2026-Q3 — application-layer docs (API + getting-started) moved to
# aster-lang.cloud/docs/* and are no longer present in this repo. Their
# carve-outs are dropped. Hand-written content under learn/community
# is fully covered by glossary scanning.
ignored-surfaces:
  - path: docs/.vitepress/**/*
    reason: site config, not user-facing prose
    expires: never
  - path: docs/public/**/*
    reason: static assets
    expires: never
  - path: docs/blog/**/*.md
    reason: editorial blog posts; en-only by editorial policy (no translations yet)
    expires: never
  - path: docs/editions/**/*.md
    reason: editions/comparison pages; translated by hand, no glossary blocks
    expires: never
  - path: docs/community/compliance/**/*.md
    reason: redacted public mirror of internal legal docs; sync via scripts/sync-enterprise-docs.mjs
    expires: never
  - path: docs/adr/**/*.md
    reason: architecture decision records; English-only by editorial policy, not site-rendered
    expires: never

untranslated-tokens:
  - Aster
  - VitePress
  - CodeMirror
  - GitHub
  - GDPR
  - REST
  - GraphQL
  - WebSocket
  - JSON
  - YAML
  - HTTP
  - HTTPS
  - API
  - SDK
  - SSE

overlay-classification:
  unmanaged-policy: warn
