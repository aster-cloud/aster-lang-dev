<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aster Cloud">
  <defs>
    <!-- Outer hexagon gradients: left half orange, right half blue. -->
    <linearGradient id="hexOrange" x1="50" y1="262" x2="512" y2="962" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFB000"/>
      <stop offset="0.55" stop-color="#FF8200"/>
      <stop offset="1" stop-color="#FF4F00"/>
    </linearGradient>
    <linearGradient id="hexBlue" x1="974" y1="262" x2="512" y2="962" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#11A8FF"/>
      <stop offset="0.55" stop-color="#2868F0"/>
      <stop offset="1" stop-color="#3727F5"/>
    </linearGradient>

    <!-- Inner Aster A gradients (same as logo.svg). The A inverts the
         hex's left/right palette: A's left blade is blue, right is
         orange. This two-axis cross gives the mark its woven look. -->
    <linearGradient id="blue" x1="250" y1="160" x2="470" y2="890" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#11A8FF"/>
      <stop offset="0.55" stop-color="#2868F0"/>
      <stop offset="1" stop-color="#3727F5"/>
    </linearGradient>
    <linearGradient id="orange" x1="760" y1="160" x2="560" y2="890" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFB000"/>
      <stop offset="0.55" stop-color="#FF8200"/>
      <stop offset="1" stop-color="#FF4F00"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" fill="white"/>

  <!-- Hexagon — pointy-top, centered at (512, 512), circumradius 462.
       Vertices clockwise from top:
         (512, 50)  → top
         (912, 281) → upper right (512 + 462·cos30°, 512 - 462·sin30°)
         (912, 743) → lower right
         (512, 974) → bottom
         (112, 743) → lower left
         (112, 281) → upper left
       Split vertically at x=512 into two halves. -->

  <!-- Left half (orange) -->
  <path d="M512 50 L112 281 L112 743 L512 974 Z" fill="url(#hexOrange)"/>

  <!-- Right half (blue) -->
  <path d="M512 50 L912 281 L912 743 L512 974 Z" fill="url(#hexBlue)"/>

  <!-- White inner hex cutout — same shape, scaled to 0.83× of the outer
       (circumradius 384). The hex frame ends up ~80px thick visually.
       Vertices: (512, 128) (843, 320) (843, 704) (512, 896) (181, 704)
                 (181, 320) -->
  <path d="M512 128 L843 320 L843 704 L512 896 L181 704 L181 320 Z" fill="white"/>

  <!-- Aster A — scaled 0.62× and nudged up so its bottom-heavy "A skirt"
       sits visually centered in the hex (the A apex is narrow, the
       baseline blades are wide, so geometric center sits below the
       visual center of mass).
       The translate offsets shift the scaled-down A back to (512, 478)
       — 34px above hex center — to balance the visual weight. After
       scaling, the A footprint is ~520×467 pixels, sitting clear of the
       white hex border (~662 wide, 768 tall). -->
  <g transform="translate(512 478) scale(0.62) translate(-512 -512)">
    <!-- Aster A: left blade (blue) -->
    <path d="M505 143 L93 896 L441 681 L371 640 L505 397 Z" fill="url(#blue)"/>
    <!-- Aster A: right blade (orange) -->
    <path d="M519 143 L931 896 L583 681 L653 640 L519 397 Z" fill="url(#orange)"/>
    <!-- Central white aperture -->
    <path d="M512 405 L371 640 L512 706 L653 640 Z" fill="white"/>
  </g>
</svg>
