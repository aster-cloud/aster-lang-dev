# Route ownership manifest — aster-lang-dev (aster-lang.dev).
#
# THIS FILE IS THE SOURCE OF TRUTH for which public URLs aster-lang.dev
# owns, mirrors, or redirects. The companion file in aster-cloud
# (`aster-cloud/config/routes.yaml`) is its sibling for aster-lang.cloud.
# Together they prevent the dual-site link rot that produced the
# `/playground` 404 incident (see ADR 0010).
#
# Status values:
#   canonical-here  — this site owns and serves the route
#   mirror          — this site renders a copy; canonical lives elsewhere
#   redirect-to     — this site only redirects to a canonical URL elsewhere
#
# Locales:
#   `all`     — served at /, /zh/, /de/ (en is the default, bare path)
#   `en-only` — only English
#   ['zh','en','de'] — explicit list
#
# Cross-site redirects (308) live in `docs/public/_redirects` for
# Cloudflare Pages; this manifest is their authoritative twin. Phase
# 2 will verify that every `_redirects` entry has a matching `redirect-to`
# row here.

version: 1
site: lang-dev
baseUrl: https://aster-lang.dev
locales:
  default: en
  prefixed: [zh, de]
generatedAt: null

routes:
  # ===== Marketing / language landing =====
  - path: /
    status: canonical-here
    owner: marketing
    source: docs/index.md
    locales: all
    notes: Aster CNL language landing page

  # ===== Learn — open-source language pedagogy =====
  - path: /learn/overview
    status: canonical-here
    owner: language
    source: docs/learn/overview.md
    locales: all

  - path: /learn/playground
    status: canonical-here
    owner: language
    source: docs/learn/playground.md
    locales: all
    notes: |
      Browser-side CodeMirror playground (Vue + WASM). NOT the same as
      Cloud's `/policies/new` editor; both are accepted entry points
      but they serve different surfaces. Cross-site links FROM Cloud
      docs into the product Playground must use
      https://aster-lang.cloud/policies/new, not https://aster-lang.dev/learn/playground.

  - path: /learn/browser-api
    status: canonical-here
    owner: language
    source: docs/learn/browser-api.md
    locales: all

  - path: /learn/cnl-quick-reference
    status: canonical-here
    owner: language
    source: docs/learn/cnl-quick-reference.md
    locales: all

  - path: /learn/deployment-guide
    status: canonical-here
    owner: language
    source: docs/learn/deployment-guide.md
    locales: all

  # ===== Editions (post-2026-Q2 rename of /pricing) =====
  - path: /editions
    status: canonical-here
    owner: marketing
    source: docs/editions/index.md
    locales: all

  - path: /editions/*
    status: canonical-here
    owner: marketing
    source: docs/editions/*.md
    locales: all

  # ===== Community / contributor hub =====
  - path: /community
    status: canonical-here
    owner: community
    source: docs/community/index.md
    locales: all

  - path: /community/contribute
    status: canonical-here
    owner: community
    source: docs/community/contribute.md
    locales: all

  - path: /community/lexicons
    status: canonical-here
    owner: community
    source: docs/community/lexicons.md
    locales: all
    notes: Authoritative contributor entry point for new language packs.

  - path: /community/wanted-languages
    status: canonical-here
    owner: community
    source: docs/community/wanted-languages.md
    locales: all

  - path: /community/compliance/*
    status: canonical-here
    owner: compliance
    source: docs/community/compliance/*.md
    locales: all
    notes: |
      Post-2026-Q2 IA: legacy /enterprise → /community/compliance same-site.
      Some pages may be public mirrors of internal Cloud compliance docs;
      where that happens, declare them as `mirror` in a follow-up Phase 2
      pass that audits per-page status.

  # ===== Blog =====
  - path: /blog
    status: canonical-here
    owner: marketing
    source: docs/blog/index.md
    locales: en-only

  - path: /blog/posts/*
    status: canonical-here
    owner: marketing
    source: docs/blog/posts/*.md
    locales: en-only

  # ===== Cross-site redirects to aster-lang.cloud =====
  # These are the authoritative twin of docs/public/_redirects.
  # Every redirect rule there should appear here so the Phase 3
  # link-checker can refuse internal links that target a redirected
  # URL (e.g. authoring `/api/foo` instead of the canonical
  # https://aster-lang.cloud/docs/api/foo).
  - path: /api/*
    status: redirect-to
    canonicalUrl: https://aster-lang.cloud/docs/api/*
    redirectCode: 308
    owner: docs
    locales: all
    notes: Application REST/GraphQL/WS docs live on Cloud as of 2026-Q3.

  - path: /getting-started/*
    status: redirect-to
    canonicalUrl: https://aster-lang.cloud/docs/getting-started/*
    redirectCode: 308
    owner: docs
    locales: all

  - path: /graphql
    status: redirect-to
    canonicalUrl: https://aster-lang.cloud/docs/api/graphql/overview
    redirectCode: 308
    owner: docs
    locales: all

  - path: /graphql/*
    status: redirect-to
    canonicalUrl: https://aster-lang.cloud/docs/api/graphql/*
    redirectCode: 308
    owner: docs
    locales: all

  - path: /websocket
    status: redirect-to
    canonicalUrl: https://aster-lang.cloud/docs/api/websocket/preview
    redirectCode: 308
    owner: docs
    locales: all

  - path: /websocket/*
    status: redirect-to
    canonicalUrl: https://aster-lang.cloud/docs/api/websocket/*
    redirectCode: 308
    owner: docs
    locales: all

  # ===== Same-site historical redirects (pre-2026-Q2 IA) =====
  - path: /pricing
    status: redirect-to
    canonicalUrl: https://aster-lang.dev/editions
    redirectCode: 301
    owner: marketing
    locales: all
    notes: 2026-Q2 same-site rename to /editions.

  - path: /pricing/*
    status: redirect-to
    canonicalUrl: https://aster-lang.dev/editions/*
    redirectCode: 301
    owner: marketing
    locales: all

  - path: /enterprise
    status: redirect-to
    canonicalUrl: https://aster-lang.dev/community/compliance/
    redirectCode: 301
    owner: marketing
    locales: all
    notes: 2026-Q2 same-site move into community/compliance.

  - path: /enterprise/*
    status: redirect-to
    canonicalUrl: https://aster-lang.dev/community/compliance/*
    redirectCode: 301
    owner: marketing
    locales: all

allowLinks: []
