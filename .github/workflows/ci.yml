name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: Glossary Contract + Locale Parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: aster-lang-dev }

      # Sibling aster-cloud checkout — required only for the enterprise
      # sync-drift check below. CROSS_REPO_TOKEN is the same secret aster-
      # api uses for cross-repo CI; when the secret is missing (forks,
      # community PRs) we skip the drift check rather than failing.
      - name: Checkout aster-cloud (for enterprise sync check)
        id: checkout-cloud
        uses: actions/checkout@v6
        continue-on-error: true
        with:
          repository: aster-cloud/aster-cloud
          path: aster-cloud
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      # Repo is checked out into ./aster-lang-dev/ so the workspace-root
      # package.json doesn't exist — pnpm/action-setup@v6 fails its
      # version-discovery step ("No pnpm version is specified") without
      # an explicit pointer at the real package.json.
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: aster-lang-dev/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: aster-lang-dev/pnpm-lock.yaml

      - name: pnpm install
        working-directory: aster-lang-dev
        run: pnpm install --frozen-lockfile

      - name: Locale parity (en backbone → zh + de mirrors must exist)
        working-directory: aster-lang-dev
        run: pnpm run check:locale-parity

      # CNL 示例编译验证 —— 提取文档中所有 ```aster 代码块，用
      # @aster-cloud/aster-lang-ts 真实编译 + 类型检查，确保发布到 aster-lang.dev
      # 的示例不会随语言演进而失效。纯展示片段标 ```aster ignore 跳过。
      - name: CNL examples compile
        working-directory: aster-lang-dev
        run: pnpm run check:examples

      # Build-side script tests — frontmatter parser, XML helpers (CDATA
      # splitting), and the compliance link-rewriter. Cheap to run, catches
      # regression in the small standalone scripts we maintain in-tree.
      - name: Script unit tests
        working-directory: aster-lang-dev
        run: pnpm run test:scripts

      # Route ownership contract (ADR 0010). Two checks:
      #   1. routes:build must be a no-op — the committed
      #      docs/public/.well-known/routes.json must match what the
      #      generator produces from config/routes.yaml.
      #   2. routes:check verifies every docs/**/*.md has a manifest
      #      entry, every _redirects rule has a redirect-to twin, and
      #      every manifest entry with `source:` resolves to a real file.
      # Phase 3 will add cross-site link validation against
      # aster-cloud's manifest snapshot.
      - name: Route ownership — generated JSON is up to date
        working-directory: aster-lang-dev
        run: |
          pnpm run routes:build
          git diff --exit-code docs/public/.well-known/routes.json
      - name: Route ownership — coverage
        working-directory: aster-lang-dev
        run: pnpm run routes:check

      # Compliance public-mirror drift detection. The DPA / DSAR /
      # telemetry-fields pages under docs/community/compliance/ are derived from
      # aster-cloud's docs/on-prem/ via scripts/sync-enterprise-docs.mjs.
      # --check fails if the generated files diverge from the source —
      # caller must rerun `pnpm sync:compliance` and commit the result.
      #
      # Skipped when aster-cloud isn't available (fork PR without
      # CROSS_REPO_TOKEN), in which case the drift check happens on the
      # next push to a branch that does have the secret.
      - name: Compliance public-mirror drift check
        if: steps.checkout-cloud.outcome == 'success'
        working-directory: aster-lang-dev
        env:
          ASTER_CLOUD_REPO: ${{ github.workspace }}/aster-cloud
        run: pnpm run check:compliance

      # Glossary Contract (v7) — Stage 1 of 4-stage remediation: report-only.
      # See aster-cloud/.claude/plan/glossary-contract.md §5 + glossary.config.yaml.
      # Flips to `check:glossary:strict` (no `|| true`, no continue-on-error) in
      # the Stage 4 PR after G8a publishes @aster-cloud/glossary to npm AND
      # the structural-mismatch sync work in zh/de docs is complete.
      - name: Glossary contract (Stage 1 — report-only)
        working-directory: aster-lang-dev
        run: pnpm run check:glossary || true
        continue-on-error: true

      - name: Upload glossary findings artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: glossary-findings
          path: |
            aster-lang-dev/glossary-findings.json
            aster-lang-dev/locale-parity-findings.json
          if-no-files-found: ignore

      - name: VitePress build (sanity)
        working-directory: aster-lang-dev
        run: pnpm docs:build

  # Every ```aster code block in the docs must actually compile with the
  # real engine. A broken first-impression example is adoption poison
  # (this guard was added after the landing hero + syntax reference were
  # found teaching syntax the compiler rejects). Runs aster-lang-test's
  # verify-doc-examples.mjs against a freshly-built aster-lang-ts.
  verify-doc-examples:
    name: Verify CNL doc examples compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: aster-lang-dev }

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-ts
          path: aster-lang-ts
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-test
          path: aster-lang-test
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - uses: pnpm/action-setup@v6
        with:
          package_json_file: aster-lang-ts/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: aster-lang-ts/pnpm-lock.yaml

      - name: Build aster-lang-ts
        working-directory: aster-lang-ts
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Verify every ```aster doc block compiles
        working-directory: aster-lang-test
        run: node scripts/verify-doc-examples.mjs
