name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        # version is read from package.json's "packageManager"

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm docs:build

      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # CF API rejects non-ASCII characters in commit messages
          # (returns "Invalid commit message, it must be a valid UTF-8
          # string. [code: 8000111]" — empirically blocked on smart
          # quotes, em-dashes, and arrows that are legal UTF-8 but
          # filtered by the deployment metadata pipeline). Override
          # with an ASCII summary derived from GITHUB_SHA so the
          # deployment never depends on commit-message contents.
          command: pages deploy docs/.vitepress/dist --project-name aster-lang-dev --branch main --commit-hash=${{ github.sha }} --commit-message="deploy ${{ github.sha }}" --commit-dirty=true
